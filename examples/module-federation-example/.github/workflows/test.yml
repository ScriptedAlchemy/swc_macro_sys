name: Module Federation Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'module-federation-example/**'
      - 'crates/swc_macro_wasm/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'module-federation-example/**'
      - 'crates/swc_macro_wasm/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: module-federation-example
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        cache-dependency-path: module-federation-example/pnpm-lock.yaml
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ". -> target"
    
    - name: Build WASM module
      run: |
        cd .. && cargo build --release -p swc_macro_wasm
        cd module-federation-example
    
    - name: Install dependencies
      run: pnpm install
    
    - name: Build applications
      run: pnpm run build
    
    - name: Run unit tests
      run: pnpm test:unit
    
    - name: Run integration tests
      run: pnpm test:integration
    
    - name: Run optimization
      run: pnpm run optimize
    
    - name: Run E2E tests
      run: |
        pnpm playwright install chromium
        pnpm test:e2e
    
    - name: Generate coverage report
      run: pnpm test:coverage
      if: matrix.node-version == '20.x'
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: matrix.node-version == '20.x'
      with:
        directory: ./module-federation-example/coverage
        flags: module-federation
    
    - name: Performance benchmarks
      run: pnpm vitest run test/performance
      if: matrix.node-version == '20.x'
    
    - name: Archive test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.node-version }}
        path: |
          module-federation-example/coverage/
          module-federation-example/test-results/